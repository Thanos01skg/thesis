{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Temperature Chart</title>
    <link rel="stylesheet" href="{% static 'adminlte/css/adminlte.min.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h2>Real-Time Temperature Chart</h2>
        <div class="card">
            <div class="card-body">
                <canvas id="temperatureChart" height="100"></canvas>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('temperatureChart').getContext('2d');
        const temperatureChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: []  // This will be populated with the datasets from the API
            },
            options: {
                responsive: true,
                scales: {
                    x: {
                        display: true,
                        title: { display: true, text: 'Time' }
                    },
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: 'Value' }
                    }
                },
                plugins: {
                    legend: { display: true }
                }
            }
        });
    
        // Fetch data from the API endpoint every few seconds
        function fetchTemperatureData() {
            fetch("{% url 'temperature_data' %}")
                .then(response => response.json())
                .then(data => {
                    temperatureChart.data.labels = data.labels;  // Set the time labels
                    temperatureChart.data.datasets = data.datasets;  // Set the datasets for each sensor
                    temperatureChart.update();
                })
                .catch(error => console.error('Error fetching data:', error));
        }
    
        // Update chart every 5 seconds
        setInterval(fetchTemperatureData, 5000);
    </script>
    
</body>
</html>
